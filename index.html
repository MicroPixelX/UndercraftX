<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UndercraftX</title>
</head>
<body>
  <div id="game-container"></div>
  <div id="hud"></div>
  <div id="crosshair"></div>
  
  <div id="start-screen">
    <h1>UndercraftX</h1>
    <p>Engine Voxel 3D</p>
    <div class="seed-row">
      <label for="seed-input">Seed:</label>
      <input type="number" id="seed-input" placeholder="Número (vazio = 42)" spellcheck="false">
    </div>
    <button id="start-btn">Clique para Jogar</button>
    <p class="controls">WASD = Mover | Mouse = Olhar | Espaço = Pular | Shift = Correr | Esc = Soltar cursor</p>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
